<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Caresync Website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="caresyncwebsite">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>caresyncwebsite</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: auto;
      position: static;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      var lastAt = 0;
      function log(kind, msg) {
        var now = Date.now();
        if (now - lastAt < 120) return;
        lastAt = now;
        console.log('[scroll-diag-web][' + kind + '] ' + msg);
      }
      window.addEventListener('scroll', function () {
        log('window-scroll', 'y=' + window.scrollY + ' innerH=' + window.innerHeight);
      }, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function () {
          log('vv-resize', 'w=' + window.visualViewport.width.toFixed(1) + ' h=' + window.visualViewport.height.toFixed(1) + ' top=' + window.visualViewport.offsetTop.toFixed(1));
        }, { passive: true });
        window.visualViewport.addEventListener('scroll', function () {
          log('vv-scroll', 'top=' + window.visualViewport.offsetTop.toFixed(1) + ' left=' + window.visualViewport.offsetLeft.toFixed(1));
        }, { passive: true });
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
